<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Hello SM 💕</title>
<style>
  * { box-sizing: border-box; }
  html, body {
    margin: 0;
    padding: 0;
    height: 100%;
    overflow: hidden;
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
  }
  body {
    background: linear-gradient(135deg, #ff9a9e 0%, #fecfef 50%, #fbc2eb 100%);
    background-size: 400% 400%;
    animation: gradientShift 12s ease infinite;
    position: relative;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  @keyframes gradientShift {
    0% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
    100% { background-position: 0% 50%; }
  }

  .heart {
    position: absolute;
    top: 100%;
    color: rgba(255,255,255,0.75);
    font-size: 22px;
    pointer-events: none;
    animation: floatUp linear infinite;
    user-select: none;
  }
  @keyframes floatUp {
    0% { transform: translateY(0) rotate(0deg); opacity: 0.9; }
    100% { transform: translateY(-110vh) rotate(360deg); opacity: 0; }
  }

  .card {
    position: relative;
    z-index: 2;
    background: rgba(255, 255, 255, 0.55);
    backdrop-filter: blur(6px);
    border-radius: 30px;
    padding: 50px 40px;
    max-width: 520px;
    width: 90%;
    text-align: center;
    box-shadow: 0 20px 50px rgba(200, 60, 120, 0.3);
    border: 2px solid rgba(255,255,255,0.6);
  }

  h1 {
    font-family: 'Brush Script MT', cursive;
    font-size: 3em;
    color: #d6336c;
    margin: 0 0 10px 0;
    text-shadow: 1px 1px 3px rgba(255,255,255,0.5);
  }

  .subtitle {
    color: #a8326b;
    font-size: 1em;
    margin-bottom: 25px;
    letter-spacing: 0.5px;
  }

  .question {
    font-size: 1.3em;
    color: #7a1f4b;
    font-weight: 600;
    margin-bottom: 35px;
    line-height: 1.4;
  }

  .btn-row {
    position: relative;
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 25px;
    height: 90px;
  }

  button {
    border: none;
    border-radius: 50px;
    padding: 18px 40px;
    font-size: 1.2em;
    font-weight: bold;
    cursor: pointer;
    transition: transform 0.15s ease, box-shadow 0.15s ease;
    box-shadow: 0 8px 20px rgba(0,0,0,0.15);
  }

  #yesBtn {
    background: linear-gradient(135deg, #ff6b9d, #c33764);
    color: white;
    font-size: 1.4em;
    padding: 22px 50px;
  }
  #yesBtn:hover {
    transform: scale(1.1);
    box-shadow: 0 12px 28px rgba(195, 55, 100, 0.5);
  }

  #noBtn {
    background: #f1f1f1;
    color: #888;
    position: relative;
    transition: left 0.2s ease, top 0.2s ease, transform 0.15s ease;
  }

  .result {
    margin-top: 30px;
    font-size: 1.4em;
    color: #d6336c;
    font-weight: bold;
    display: none;
    animation: pop 0.4s ease;
  }
  @keyframes pop {
    0% { transform: scale(0); opacity: 0; }
    70% { transform: scale(1.15); }
    100% { transform: scale(1); opacity: 1; }
  }

  .date-box {
    margin-top: 8px;
    font-size: 1em;
    color: #8a3a5c;
  }
</style>
</head>
<body>

<div class="card">
  <h1>Hi Sandler, Will You? 💗</h1>
  <div class="subtitle">A little question for Sam's special someone...</div>
  <div class="question">
    Will you join a planned date for our Anniversary this <strong>July 6, 2026</strong>? 🌹
  </div>

  <div class="btn-row" id="btnRow">
    <button id="yesBtn" onclick="sayYes()">YES 💖</button>
    <button id="noBtn" onclick="dodge()">NO</button>
  </div>

  <div class="result" id="result"></div>
  <div class="date-box" id="dateBox"></div>
  <div class="date-box" id="dateBox2"></div>
</div>

<script>
  // Floating hearts background
  const hearts = ['💗','💖','💕','💓','❤️','💞'];
  function createHeart() {
    const heart = document.createElement('div');
    heart.className = 'heart';
    heart.textContent = hearts[Math.floor(Math.random() * hearts.length)];
    heart.style.left = Math.random() * 100 + 'vw';
    heart.style.fontSize = (16 + Math.random() * 20) + 'px';
    const duration = 6 + Math.random() * 6;
    heart.style.animationDuration = duration + 's';
    document.body.appendChild(heart);
    setTimeout(() => heart.remove(), duration * 1000);
  }
  setInterval(createHeart, 350);

  // NO button runs away
  const noBtn = document.getElementById('noBtn');
  const btnRow = document.getElementById('btnRow');

  let dodging = false;

  function activateDodgeMode() {
    if (noBtn.style.position !== 'absolute') {
      const rowRect = btnRow.getBoundingClientRect();
      const btnRect = noBtn.getBoundingClientRect();
      noBtn.style.position = 'absolute';
      noBtn.style.margin = '0';
      // lock in current visual spot first so it doesn't jump on activation
      noBtn.style.left = (btnRect.left - rowRect.left) + 'px';
      noBtn.style.top = (btnRect.top - rowRect.top) + 'px';
    }
    dodging = true;
  }

  function dodge(cursorX, cursorY) {
    activateDodgeMode();

    const rowRect = btnRow.getBoundingClientRect();
    const btnRect = noBtn.getBoundingClientRect();
    const maxLeft = rowRect.width - btnRect.width;
    const maxTop = rowRect.height - btnRect.height;

    // Try several random spots, pick the one farthest from the cursor
    let bestLeft = 0, bestTop = 0, bestDist = -1;
    for (let i = 0; i < 12; i++) {
      const candLeft = Math.random() * maxLeft;
      const candTop = Math.random() * maxTop;
      const candCenterX = rowRect.left + candLeft + btnRect.width / 2;
      const candCenterY = rowRect.top + candTop + btnRect.height / 2;
      const dist = (cursorX !== undefined)
        ? Math.hypot(candCenterX - cursorX, candCenterY - cursorY)
        : Math.random();
      if (dist > bestDist) {
        bestDist = dist;
        bestLeft = candLeft;
        bestTop = candTop;
      }
    }

    noBtn.style.left = bestLeft + 'px';
    noBtn.style.top = bestTop + 'px';
  }

  // Proactively flee as soon as the cursor gets close, so it can never be caught
  const DODGE_RADIUS = 90;
  document.addEventListener('mousemove', (e) => {
    const btnRect = noBtn.getBoundingClientRect();
    const cx = btnRect.left + btnRect.width / 2;
    const cy = btnRect.top + btnRect.height / 2;
    const dist = Math.hypot(e.clientX - cx, e.clientY - cy);
    if (dist < DODGE_RADIUS) {
      dodge(e.clientX, e.clientY);
    }
  });

  // Mobile: dodge on touch near the button
  document.addEventListener('touchstart', (e) => {
    const touch = e.touches[0];
    const btnRect = noBtn.getBoundingClientRect();
    const cx = btnRect.left + btnRect.width / 2;
    const cy = btnRect.top + btnRect.height / 2;
    const dist = Math.hypot(touch.clientX - cx, touch.clientY - cy);
    if (dist < DODGE_RADIUS * 1.5) {
      dodge(touch.clientX, touch.clientY);
    }
  }, { passive: true });

  function sayYes() {
    document.getElementById('btnRow').style.display = 'none';
    const result = document.getElementById('result');
    result.style.display = 'block';
    result.textContent = "Yay! You said YES! 🎉💍";
    document.getElementById('dateBox').textContent = "See you on our special date — July 6, 2026 💐";
    document.getElementById('dateBox2').textContent = "Trust me, it'll be safe and we'll have fun!";
    launchHeartBurst();
  }

  function launchHeartBurst() {
    for (let i = 0; i < 40; i++) {
      setTimeout(createHeart, i * 40);
    }
  }
</script>

</body>
</html>
